<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" stroke="#1e40af" stroke-width="32"/>

  <!-- Truck icon -->
  <g transform="translate(256, 256)">
    <!-- Truck body -->
    <rect x="-120" y="-40" width="160" height="80" rx="8" fill="white"/>
    <!-- Truck cabin -->
    <rect x="-200" y="-60" width="80" height="100" rx="6" fill="white"/>
    <!-- Wheels -->
    <circle cx="-160" cy="60" r="20" fill="#374151"/>
    <circle cx="-80" cy="60" r="20" fill="#374151"/>
    <circle cx="40" cy="60" r="20" fill="#374151"/>
    <!-- Wheel rims -->
    <circle cx="-160" cy="60" r="12" fill="#9ca3af"/>
    <circle cx="-80" cy="60" r="12" fill="#9ca3af"/>
    <circle cx="40" cy="60" r="12" fill="#9ca3af"/>
    <!-- Package on truck -->
    <rect x="-100" y="-20" width="40" height="30" rx="2" fill="#f59e0b"/>
    <rect x="-90" y="-15" width="20" height="3" fill="#d97706"/>
  </g>

  <!-- Zedwell text -->
  <text x="256" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">ZEDWELL</text>
  <text x="256" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="white">DRIVER</text>
</svg>